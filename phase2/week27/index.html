<!DOCTYPE html>
<html>
    <head>
        <title>
            Flashcards
        </title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <h1>
            Flashcards Study Helper
        </h1>
        <p id="progress">
        </p>
        <div id="card-container" onclick="flipCard()">
            <div id="card">
                <p id="card-text">
                </p>
            </div>
        </div>
        <div class="controls">
            <button onclick="nextCard()">
                next card
            </button>
        </div>
        <script src="script.js"></script>
    </body>
</html>
